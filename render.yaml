services:
  - type: web
    name: abbaytv
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        value: abbaytv-secret-key-2024
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: abbaytv-db
          property: connectionString

databases:
  - name: abbaytv-db
    databaseName: abbaytv
    user: abbaytv_user